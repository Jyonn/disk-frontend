name: Deploy Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PAGES_DEPLOY_TOKEN: ${{ secrets.PAGES_DEPLOY_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure GitHub Pages with auto-enable
        if: ${{ env.PAGES_DEPLOY_TOKEN != '' }}
        uses: actions/configure-pages@v5
        with:
          token: ${{ env.PAGES_DEPLOY_TOKEN }}
          enablement: true

      - name: Verify Pages is enabled
        if: ${{ env.PAGES_DEPLOY_TOKEN == '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          api="https://api.github.com/repos/${REPO}/pages"
          status=$(curl -s -o /tmp/pages.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "$api")
          if [ "$status" = "404" ]; then
            echo "::error title=GitHub Pages not enabled::Open Settings -> Pages, set Source to GitHub Actions, then re-run this workflow. If you want auto-enablement, create a secret named PAGES_DEPLOY_TOKEN with repo/pages write access."
            cat /tmp/pages.json
            exit 1
          fi

      - name: Configure GitHub Pages
        if: ${{ env.PAGES_DEPLOY_TOKEN == '' }}
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build:pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/disk-frontend

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
